<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#d47a19" />
    <title>Javanesia Offline</title>
    <style>
      :root {
        color: #2e1d10;
        background: #f7ead7;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.72), transparent 34rem),
          linear-gradient(180deg, #c9efff 0%, #f7ead7 58%, #e7c89c 100%);
      }

      main {
        width: min(460px, 100%);
        text-align: center;
      }

      img {
        width: min(160px, 42vw);
        height: auto;
        filter: drop-shadow(0 12px 24px rgba(46, 29, 16, 0.18));
      }

      h1 {
        margin: 20px 0 10px;
        font-size: clamp(2rem, 10vw, 3.4rem);
        line-height: 0.95;
        color: #ff8a19;
        text-transform: uppercase;
        text-shadow: 0 3px 0 #ffffff, 0 8px 18px rgba(46, 29, 16, 0.18);
      }

      p {
        margin: 0 auto;
        max-width: 34ch;
        font-size: 1rem;
        font-weight: 700;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/assets/logo-icon.png" alt="Logo Javanesia" />
      <h1>Javanesia</h1>
      <p>Aplikasi sedang offline. Buka kembali saat jaringan tersedia, atau akses materi yang sudah pernah dimuat sebelumnya.</p>
    </main>
  </body>
</html>
